name: release
on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  # Re-run the critical gates against the exact tag commit so a tag pushed at an
  # unverified commit cannot publish binaries (ci runs only on branches / PRs,
  # not on tags). gozer is vendored, so every step builds with -mod=vendor.
  verify:
    runs-on: [self-hosted, builder02, lxc]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - run: go build -mod=vendor ./...
      - run: go vet -mod=vendor ./...
      - name: gofmt
        run: test -z "$(gofmt -l cmd internal)" || { gofmt -l cmd internal; exit 1; }
      - name: test (race)
        run: go test -mod=vendor -race ./...
      - name: staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...
      - name: gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec ./...
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  goreleaser:
    needs: verify
    runs-on: [self-hosted, builder02, lxc]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
