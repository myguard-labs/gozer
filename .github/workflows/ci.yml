name: ci
on:
  push:
    branches: [master, main]
  pull_request:

permissions:
  contents: read

jobs:
  go:
    runs-on: [self-hosted, builder02, lxc]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: go.sum
      - name: build
        run: go build -mod=vendor ./...
      - name: vet
        run: go vet -mod=vendor ./...
      - name: gofmt
        run: |
          unformatted=$(gofmt -l cmd internal)
          if [ -n "$unformatted" ]; then echo "gofmt needed on:"; echo "$unformatted"; exit 1; fi
      - name: test (race)
        run: go test -mod=vendor -race ./...
      # Smoke-fuzz the untrusted HTTP request path + the server-list parser.
      # Long fuzzing is local-only (see fuzz.sh); CI just guards against
      # regressions that crash within a few seconds.
      - name: fuzz (smoke)
        run: |
          go test -mod=vendor -run=x -fuzz='^FuzzServe$' -fuzztime=30s ./internal/gozer/
          go test -mod=vendor -run=x -fuzz='^FuzzParsePyzorServers$' -fuzztime=20s ./internal/gozer/

  lint:
    runs-on: [self-hosted, builder02, lxc]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: go.sum
      - name: staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...
      - name: gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec ./...
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  codeql:
    runs-on: [self-hosted, builder02, lxc]
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v5
      - uses: github/codeql-action/init@v3
        with:
          languages: go
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: go.sum
      - run: go build -mod=vendor ./...
      - uses: github/codeql-action/analyze@v3
